log:
  level: INFO

accessLog: {}

# Internal ping endpoint for health checks (not exposed externally).
ping: {}

# Dashboard disabled in production.
api:
  dashboard: false

entryPoints:
  # HTTP — redirects all traffic to HTTPS.
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS — TLS terminated here, traffic forwarded plain to services.
  websecure:
    address: ":443"

  # Kafka — TCP with TLS (SNI routing).
  kafka:
    address: ":9092"

providers:
  # Docker label-based routing.
  docker:
    exposedByDefault: false
    network: prod

  # File-based dynamic config (TLS certificates).
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
