  #    - "traefik.http.routers.polaris.service=polaris"
  #    - "traefik.http.services.polaris.loadbalancer.server.port=8181"
  #  healthcheck:
  #    test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health || exit 1"]
