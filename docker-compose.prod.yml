# Production stack: Traefik + Redpanda + Polaris + Alloy + cAdvisor
#
# Prerequisites:
#   1. Generate TLS certificates: bash .docker/generate-certs.sh
#   2. Replace changeme.com with your actual domain in labels and
#      Redpanda's --advertise-kafka-addr flag.
#   3. Replace POLARIS_BOOTSTRAP_CREDENTIALS with a secure secret.
#
# Start:  docker compose -f docker-compose.prod.yml up -d
# Stop:   docker compose -f docker-compose.prod.yml down

networks:
  prod:
    # Fixed name so Traefik's docker provider always resolves it,
    # regardless of the compose project name.
    name: prod
    driver: bridge

volumes:
  redpanda_data:

services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP  → redirected to HTTPS
      - "443:443"    # HTTPS → Polaris, Redpanda Schema Registry
      - "9092:9092"  # Kafka → TCP/TLS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.docker/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - ./.docker/traefik.dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./.docker/certs:/certs:ro
    networks:
      - prod
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
  
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      # Two listeners: internal (plain TCP within Docker) and external
      # (routed through Traefik with TLS termination).
      - --kafka-addr          internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://redpanda.changeme.com:9092
      - --pandaproxy-addr     internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://redpanda.changeme.com:443
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr             redpanda:33145
      - --advertise-rpc-addr   redpanda:33145
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - prod
    labels:
      - "traefik.enable=true"

      # --- Kafka (TCP/TLS on port 9092) ---
      # Traefik terminates TLS via SNI, forwards plain TCP to redpanda:9092.
      - "traefik.tcp.routers.kafka.rule=HostSNI(`redpanda.changeme.com`)"
      - "traefik.tcp.routers.kafka.entrypoints=kafka"
      - "traefik.tcp.routers.kafka.tls=true"
      - "traefik.tcp.routers.kafka.service=kafka"
      - "traefik.tcp.services.kafka.loadbalancer.server.port=9092"

      # --- Schema Registry (HTTPS on port 443) ---
      - "traefik.http.routers.schema-registry.rule=Host(`redpanda.changeme.com`)"
      - "traefik.http.routers.schema-registry.entrypoints=websecure"
      - "traefik.http.routers.schema-registry.tls=true"
      - "traefik.http.routers.schema-registry.service=schema-registry"
      - "traefik.http.services.schema-registry.loadbalancer.server.port=8081"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


  #polaris:
