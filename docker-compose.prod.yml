  # Embeds cAdvisor, collects Docker & Redpanda metrics.
  # Not exposed via Traefik — internal only.
  # OTLP ports (4317/4318) are reachable from other containers on the prod
  # network. Expose them on the host if the app runs outside Docker.
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    privileged: true
    restart: unless-stopped
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/conf.alloy"]
    environment:
      - HOST=${HOST}
      - OTLP_ENDPOINT=https://collector.changeme.com:4317
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - ./.docker/conf.alloy.prod:/etc/alloy/conf.alloy
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - prod
    depends_on:
      redpanda:
        condition: service_healthy

  # Web UI for Redpanda. Exposed at console.redpanda.changeme.com behind
  # Traefik basic auth (admin / changeme — replace before deploying).
  # To regenerate the hash: openssl passwd -apr1 <password>
  # then escape every $ as $$ in the label value below.
  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=redpanda:9092
    networks:
      - prod
    depends_on:
      redpanda:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      # --- Basic auth middleware ---
      - "traefik.http.middlewares.console-auth.basicauth.users=admin:$$apr1$$wyLNA4li$$CENvkHN29g/HlsVzW2SMs."

      # --- Console UI (HTTPS on port 443) ---
      - "traefik.http.routers.console.rule=Host(`console.redpanda.changeme.com`)"
      - "traefik.http.routers.console.entrypoints=websecure"
      - "traefik.http.routers.console.tls=true"
      - "traefik.http.routers.console.middlewares=console-auth"
      - "traefik.http.routers.console.service=console"
      - "traefik.http.services.console.loadbalancer.server.port=8080"
