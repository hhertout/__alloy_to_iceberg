log:
  # Logging level (e.g., debug, info, warn, error)
  level: info

# Grafana configuration
grafana:
  url: http://localhost:3000
  api_key: $GRAFANA_SA_TOKEN

storage:
  # Amazon S3 configuration
  # s3:
  #   bucket_name: $AWS_S3_BUCKET_NAME
  #   region_name: $AWS_S3_REGION
  #   endpoint_url: $AWS_S3_ENDPOINT_URL
  #   aws_access_key_id: $AWS_ACCESS_KEY_ID
  #   aws_secret_access_key: $AWS_SECRET_ACCESS_KEY
  #   aws_session_token: $AWS_SESSION_TOKEN
  #   aws_regoin: $AWS_REGION
  #   file_prefix: chunk
  #   file_identifier: dataframe
  #   chunk_folder: chunks
  #   models_folder: models

  # Azure storage configuration
  azure:
    account_name: $AZURE_STORAGE_ACCOUNT_NAME
    container_name: $AZURE_STORAGE_CONTAINER_NAME
    connection_string: $AZURE_STORAGE_CONNECTION_STRING
    file_prefix: chunk
    file_identifier: dataframe
    chunk_folder: chunks
    models_folder: models

# Specs for the integration pipeline
integration:
  # Producer configuration for scraping Grafana data sources and writing to topic as otp format
  producer:
    scrape_interval_min: 1
    # Queries scraped periodically from Grafana data sources (Prometheus, Loki) to generate training data.
    # Must return numeric values.
    queries:
      prometheus:
        Mimir:
          - id: avg_scrape_duration_seconds
            query: "avg_over_time(scrape_duration_seconds{job=\"integrations/self\"}[1m])"
            # Set resource attributes to associate with the metric data points generated by the query.
            # Resources attributes are no longer visible in Grafana queries.
            resource_attributes:
              service.name: integrations
              service.instance.id: alloy-jhfs786sbh9
          - id: rate_container_cpu_usage_seconds_total
            query: "rate(container_cpu_usage_seconds_total{}[1m])"
            resource_attributes:
              service.name: integrations
              service.instance.id: alloy-bshjvkdza
      loki:
        Loki:
          - id: count_over_time_info_alloy
            query: "count_over_time({service_name=\"alloy\"} |= \"info\" [1m])"
            resource_attributes:
              service.name: alloy
              service.instance.id: alloy-self
  
  # Number of rows to process in each batch before writing to storage (in MB)
  batch_size: 3
  # Kafka configuration for consuming OpenTelemetry data
  kafka:
    # Kafka broker address (e.g., localhost:9092)
    broker: $KAFKA_BROKER
    # Kafka topic to consume from
    topic: monitoring
    # Kafka consumer group ID
    group_id: torch-group-1
  # Iceberg configuration for storing processed data
  iceberg:
    # Iceberg catalog configuration
    namespace: obs
    catalog_name: test_catalog
    database_name: internal_monitoring
    warehouse_path: lakehouse
    postgres:
      connection_string: $POSTGRESQL_CONNECTION_STRING
      ssl_enabled: false
    # Polaris client configuration
    #polaris:
    #  url: $POLARIS_URL
    #  token: $POLARIS_TOKEN
  # Metrics processing configuration
  metrics:
    include:
        - name: otelcol_exporter_queue_size
        - name: redpanda_cluster_topics
          attributes:
             job: "redpanda"
        - name: go_gc_cycles_automatic_gc_cycles_total
          attributes:
             instance: "localhost:9090"
        - name: redpanda_kafka_quotas_client_quota_throttle_time_bucket
          resource_attributes:
             service.instance.id: "redpanda.*"
        - name: container_memory_usage_bytes
          attributes:
             name: "alloy"
        - name: container_cpu_usage_seconds_total
          attributes:
             name: "alloy"
  # Logs processing configuration
  logs:
    include:
      - service_name: redpanda
        level: info
        contains: ".*ml_obs.*"

# Model training configuration and limits
limits:
  # Number of days to query data and push to storage (yesterday + limits.offset_days). 
  # offset_days: 0 # defaults 0
  training_window_days: 2 # defaults 90
  # Proportion of the dataset to include in the test split (between 0.0 and 1.0)
  training_test_size: 0.15 # defaults 0.15
  # Proportion of the dataset to include in the validation split (between 0.0 and 1.0)
  training_val_size: 0.15 # defaults 0.15
  # Target column name in the dataset
  target_column_name: alloy_queue_length # defaults "target"

models:
  random_forest:
    enabled: true
    n_estimators: 40
    max_depth: 8
    min_samples_split: 7
    random_state: 42
    n_jobs: -1
    verbose: 0
  xgboost:
    enabled: true
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.08
    subsample: 0.9
    colsample_bytree: 0.8
    min_child_weight: 1
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    n_jobs: -1
    verbosity: 0
  prophet:
    enabled: true
    seasonality_mode: additive
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    yearly_seasonality: false
    weekly_seasonality: true
    daily_seasonality: true
  pytorch:
    enabled: false
    device: auto  # auto|cpu|mps|cuda
    ensemble_runs: 1  # increase to 3+ for best quality in production
    sequence_length: 1440  # 1 day of minute-level data = 1440 minutes
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
    learning_rate: 0.0005
    weight_decay: 0.00001
    batch_size: 512
    epochs: 10
    early_stopping_patience: 7
    random_seed: 42

# OpenTelemetry configuration
telemetry:
  endpoint: $OTEL_EXPORTER_OTLP_ENDPOINT
  # OpenTelemetry attributes configuration for metrics and logs
  env: $OTEL_ENV
  service_name: dl_obs
  service_namespace: dl_obs
  service_version: 0.1.0
